---
- hosts: localhost
  connection: local
  # Esto elimina el warning de pattern matching
  gather_facts: yes

  tasks:
    - name: Actualizar el listado de paquetes
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar herramientas basicas
      apt:
        name: 
          - curl
          - htop
        state: present

    - name: Crear archivo de confirmacion
      copy:
        content: "DCSolutions Lab - Ejecutado el {{ ansible_date_time.iso8601 }}"
        dest: /tmp/ansible_ok.txt
